name: frontend
description: "Production-ready Flutter app with Clean Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Security
  flutter_dotenv: 

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.0.0
  
  # HTTP Client
  dio: ^5.4.3
  
  # Secure Storage
  flutter_secure_storage: ^9.0.0
  
  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  
  # Utilities
  equatable: ^2.0.5
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # Code Generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
